<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكاننا الخاص</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05070a; color: white;
            font-family: 'Amiri', serif; overflow: hidden;
        }

        /* ستار النجوم */
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 0; }

        /* نافذة كلمة السر */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: 1s;
        }

        .login-box {
            text-align: center; padding: 30px; border: 1px solid #d4af37;
            border-radius: 15px; background: rgba(255, 255, 255, 0.05);
        }

        input {
            background: transparent; border: none; border-bottom: 2px solid #d4af37;
            color: white; padding: 10px; text-align: center; font-size: 1.2rem;
            outline: none; margin-bottom: 20px; width: 200px;
        }

        button {
            background: #d4af37; border: none; padding: 10px 30px;
            color: black; font-weight: bold; border-radius: 5px; cursor: pointer;
        }

        /* المحتوى المخفي */
        #main-content {
            position: relative; z-index: 1; display: none;
            text-align: center; padding: 20px;
        }

        h1 { color: #d4af37; font-size: 2.5rem; margin-top: 20vh; }
        .message { font-size: 1.6rem; line-height: 2; max-width: 700px; margin: auto; }
        .highlight { color: #d4af37; font-weight: bold; }
        
        /* تأثير الظهور التدريجي */
        .fade-in { opacity: 0; transform: translateY(20px); transition: 2s; }
        .show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="lock-screen">
        <div class="login-box">
            <h2>مكانٌ لا يدخلهُ إلا أصحابه</h2>
            <p>أدخلي كلمة السر التي تفتح باب عهدنا</p>
            <input type="password" id="passInput" placeholder="كلمة السر...">
            <br>
            <button onclick="checkPass()">دخول</button>
        </div>
    </div>

    <div id="main-content">
        <h1 class="fade-in">إلى مَن اختارها قلبي..</h1>
        <div class="message">
            <p class="fade-in">سنتانِ مَضتا.. واليقينُ بداخلي لا يَهتز.</p>
            <p class="fade-in">سافِري، انجحي، وكوني الأعظم..</p>
            <p class="fade-in">لكن تذكري أن <span class="highlight">"النصيب"</span> ينتظرُ إشارةً منكِ.</p>
            <p class="fade-in">أنا هُنا، وسأبقى هُنا.. لأنكِ الوطن والملجأ.</p>
        </div>
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // كود النجوم (Canvas)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = [];
        for(let i=0; i<200; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, d: Math.random()*200});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });
        }
        setInterval(draw, 50);

        // التحقق من كلمة السر
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            // غير كلمة "2026" لأي كلمة سر بدك ياها
            if(pass === "2023/1/12") {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('bgMusic').play();
                    showText();
                }, 1000);
            } else {
                alert("كلمة سر خاطئة.. حاولي مجدداً بقلبك.");
            }
        }

        // إظهار النص سطر بسطر
        function showText() {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('show');
                }, index * 2500); // كل سطر يظهر بعد ثانيتين ونصف
            });
        }
    </script>
</body>
</html>
